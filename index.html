<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queue System น่ารักๆ</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #FFF5F7;
            font-family: 'Kanit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #A0767D;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(255, 183, 197, 0.4);
            width: 80%;
            max-width: 400px;
        }
        h1 { color: #FF9AA2; }
        .queue-number {
            font-size: 4rem;
            font-weight: bold;
            color: #FFB7C5;
            margin: 20px 0;
        }
        button {
            background-color: #FFB7C5;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.05);
            background-color: #FFA1B5;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>คิวปัจจุบัน</h1>
        <div class="queue-number" id="queueDisplay">01</div>
        <button onclick="nextQueue()">รับคิวถัดไป</button>
    </div>

    <script>
        let currentQueue = 1;
        function nextQueue() {
            currentQueue++;
            document.getElementById('queueDisplay').innerText = 
                currentQueue.toString().padStart(2, '0');
        }
    </script>
</body>
</html>
