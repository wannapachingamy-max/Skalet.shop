<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>My Pastel Queue ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { background-color: #FFF5F7; font-family: 'Kanit', sans-serif; color: #A0767D; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 30px; width: 100%; max-width: 400px; box-shadow: 0 10px 20px rgba(255, 183, 197, 0.3); }
        h2 { text-align: center; color: #FF9AA2; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input { border: 2px solid #FFD1DC; border-radius: 15px; padding: 10px; flex-grow: 1; outline: none; }
        button { background-color: #FFB7C5; color: white; border: none; padding: 10px 20px; border-radius: 15px; cursor: pointer; }
        ul { list-style: none; padding: 0; }
        li { background: #FFF5F7; padding: 10px; margin-bottom: 10px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; }
        .done { text-decoration: line-through; opacity: 0.6; }
    </style>
</head>
<body>

<div class="card">
    <h2>รายการคิววันนี้ 🎀</h2>
    <div class="input-group">
        <input type="text" id="taskInput" placeholder="เพิ่มคิวงานตรงนี้...">
        <button onclick="addTask()">เพิ่ม</button>
    </div>
    <ul id="taskList"></ul>
</div>

<script>
    function addTask() {
        let input = document.getElementById("taskInput");
        if (input.value === "") return;
        
        let li = document.createElement("li");
        li.innerHTML = `${input.value} <button onclick="this.parentElement.classList.toggle('done')">✓</button>`;
        document.getElementById("taskList").appendChild(li);
        input.value = "";
    }
</script>
</body>
</html>
